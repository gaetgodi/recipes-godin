<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Book cover -->
  <rect x="6" y="4" width="20" height="24" rx="1" fill="#c84a31"/>
  
  <!-- Book spine shadow -->
  <rect x="6" y="4" width="2" height="24" fill="#a63820"/>
  
  <!-- Page lines -->
  <line x1="10" y1="10" x2="22" y2="10" stroke="white" stroke-width="1" opacity="0.8"/>
  <line x1="10" y1="13" x2="22" y2="13" stroke="white" stroke-width="1" opacity="0.8"/>
  <line x1="10" y1="16" x2="22" y2="16" stroke="white" stroke-width="1" opacity="0.8"/>
  <line x1="10" y1="19" x2="18" y2="19" stroke="white" stroke-width="1" opacity="0.8"/>
  
  <!-- Spoon icon on cover -->
  <ellipse cx="16" cy="23" rx="2" ry="2.5" fill="white" opacity="0.9"/>
  <rect x="15.5" y="20" width="1" height="3" fill="white" opacity="0.9"/>
  
  <!-- Book binding rings -->
  <circle cx="8" cy="8" r="0.8" fill="#a63820"/>
  <circle cx="8" cy="14" r="0.8" fill="#a63820"/>
  <circle cx="8" cy="20" r="0.8" fill="#a63820"/>
  <circle cx="8" cy="26" r="0.8" fill="#a63820"/>
</svg>
